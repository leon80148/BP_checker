name: quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@81d310742121c928ea9c8bbd407b4217b432ae02 # v2.0.0
        with:
          version: 1.4.1

      - name: Install host tools
        run: sudo apt-get update && sudo apt-get install --yes jq

      - name: Run the local quality gate
        env:
          BP_RELEASE_PUBLIC_KEY_DER_HEX: ${{ vars.BP_RELEASE_PUBLIC_KEY_DER_HEX }}
        run: bash scripts/run_quality_gate.sh

      - name: Package unsigned release candidate
        env:
          BP_RELEASE_SEQUENCE: ${{ github.run_number }}
          BP_RELEASE_MINIMUM_SEQUENCE: "0"
          BP_RELEASE_PUBLIC_KEY_DER_HEX: ${{ vars.BP_RELEASE_PUBLIC_KEY_DER_HEX }}
        run: bash scripts/package_release.sh --candidate

      - name: Upload traceable build evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: BP_checker-${{ github.sha }}
          if-no-files-found: error
          path: |
            build/firmware/*.bin
            build/firmware/compile.log
            build/sbom.json
            build/release/**
